<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Formulaires Fournisseurs — BE Union Matériaux</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0EDE6;min-height:100vh;color:#1A1A1A;font-size:13px}
/* HEADER */
.hd{background:#3A4E1E;color:#fff;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hb{display:flex;align-items:center;gap:11px}
.lg{width:36px;height:36px;background:#C8A84B;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.ht{font-size:15px;font-weight:700}.hs{font-size:11px;opacity:.7;margin-top:1px}
.hbg{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px}
/* STEPS */
.stps{background:#fff;border-bottom:1px solid #E0DDD7;display:flex;padding:0 22px}
.stp{padding:11px 14px;font-size:12px;font-weight:500;color:#bbb;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px}
.stp.act{color:#3A4E1E;border-bottom-color:#3A4E1E;font-weight:700}
.stp.dn{color:#526227}
.sn{width:19px;height:19px;border-radius:50%;background:#EEE;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.stp.act .sn{background:#3A4E1E;color:#fff}.stp.dn .sn{background:#ECF5E2;color:#3A4E1E}
/* CARDS */
.ct{max-width:960px;margin:0 auto;padding:18px 14px 90px}
.card{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ch{padding:11px 18px;display:flex;align-items:center;gap:8px}
.ch h2{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.cb{padding:14px 18px}
.si .ch{background:#3A4E1E;color:#fff}
.sz .ch{background:#526227;color:#fff}
.sf .ch{background:#C8A84B;color:#fff}
.sn2 .ch{background:#526227;color:#fff}
.so .ch{background:#526227;color:#fff}
.sfm .ch{background:#1B5E8C;color:#fff}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 14px}
/* FIELDS */
.fd{display:flex;flex-direction:column;gap:3px}
.fd label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
input,select{border:1.5px solid #D8D5CF;border-radius:8px;padding:7px 10px;font-size:13px;color:#1A1A1A;background:#fff;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus{border-color:#3A4E1E;box-shadow:0 0 0 2px rgba(58,78,30,.08)}
input.au{background:#E6F3FC;color:#154E6E;font-weight:600;border-color:#B0CFEA}
input.ca{background:#E8F7DA;color:#295210;font-weight:700;border-color:#B4D490}
input[readonly]{cursor:default}
/* FOURNISSEUR TOGGLES */
.fg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.fc{border:2px solid #D8D5CF;border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#fff;transition:all .15s;user-select:none}
.fc:hover{border-color:#526227;background:#F3F7EC}
.fc.on{border-color:#3A4E1E;background:#ECF5E2}

.fck{width:18px;height:18px;border-radius:50%;border:2px solid #D8D5CF;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s;flex-shrink:0}
.fc.on .fck{background:#3A4E1E;border-color:#3A4E1E;color:#fff}

.fcl{font-size:12px;font-weight:500;color:#888;transition:color .15s}
.fc.on .fcl{color:#3A4E1E;font-weight:700}

/* NIVEAUX TABLE */
#niv-table-wrap table{width:100%;border-collapse:collapse}
#niv-table-wrap th{background:#4E5F24;color:#fff;padding:8px 8px;font-size:11px;font-weight:600;text-align:left}
#niv-table-wrap th:first-child{border-radius:6px 0 0 6px}
#niv-table-wrap th:last-child{border-radius:0 6px 6px 0}
#niv-table-wrap td{padding:4px 3px;border-bottom:1px solid #F3F0EA}
#niv-table-wrap tr:last-child td{border-bottom:none}
.nl{font-size:12px;font-weight:600;color:#526227;padding:0 5px;white-space:nowrap}
.ns{border:1.5px solid #D8D5CF;border-radius:6px;padding:6px 7px;font-size:12px;background:#fff;font-family:inherit;outline:none;width:100%}
.ns:focus{border-color:#3A4E1E}
/* DISABLED — triple-verrou pour tous navigateurs */
.ns[disabled],.ns.dis{
  pointer-events:none !important;
  opacity:0.32 !important;
  background:#EDEBE6 !important;
  color:#AAA !important;
  cursor:not-allowed !important;
  border-color:#E0DDD7 !important;
}
/* BUTTONS */
.btn{border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-family:inherit}
.bp{background:#3A4E1E;color:#fff}.bp:hover{background:#2C3C16}
.bs{background:#fff;color:#3A4E1E;border:2px solid #3A4E1E}.bs:hover{background:#F3F7EC}
.bo{background:#C8A84B;color:#fff}.bo:hover{background:#B09038}
.bsm{padding:6px 13px;font-size:12px}
.ab{background:#fff;border-top:1px solid #E0DDD7;padding:13px 22px;display:flex;justify-content:space-between;align-items:center;position:fixed;bottom:0;left:0;right:0;z-index:50}
/* FICHE VIEW */
.fl{display:grid;grid-template-columns:175px 1fr;gap:14px}
.fsb{display:flex;flex-direction:column;gap:4px}
.ft{padding:9px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#777;background:#fff;border:1.5px solid #E0DDD7;transition:all .15s}
.ft:hover{background:#F3F7EC;border-color:#526227}
.ft.act{background:#3A4E1E;color:#fff;border-color:#3A4E1E;font-weight:700}

.fcard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.09)}
.ftb{background:#3A4E1E;color:#fff;padding:15px 19px;display:flex;justify-content:space-between;align-items:center}

.ftb h1{font-size:15px;font-weight:700;letter-spacing:.3px}
.ftb p{font-size:11px;opacity:.7;margin-top:2px}
.fsh{padding:8px 16px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.fsh.g{background:#4E5F24;color:#fff}
.fsh.or{background:#C8A84B;color:#fff}

.idg{display:grid;grid-template-columns:1fr 1fr}
.il{background:#F3EFE7;padding:8px 14px;font-size:11px;font-weight:600;color:#5C5650;border-bottom:1px solid #EDE8E0}
.iv{padding:8px 14px;font-size:12px;border-bottom:1px solid #EDE8E0;background:#fff}
.iv.a{background:#E6F3FC;color:#154E6E;font-weight:500}
.iv.c{background:#E8F7DA;color:#295210;font-weight:700}
.fnt{width:100%;border-collapse:collapse;font-size:12px}
.fnt th{background:#ECF5E2;color:#295210;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border-bottom:2px solid #B4D490}
.fnt td{padding:8px 12px;border-bottom:1px solid #F5F2EC}
.fnt tr:last-child td{border-bottom:none}
.fnt tr:hover td{background:#FAFAF8}
.pn{font-weight:600;color:#526227}.pm{color:#1A1A1A}.pauc{color:#CCC;font-style:italic}
.pu,.pr{background:#E6F3FC;color:#154E6E;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.pmw{background:#3A4E1E;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700}
.pwn{background:#FFF3CD;color:#856404;padding:2px 6px;border-radius:4px;font-size:10px}
.og{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px 16px}
.or2{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#F9F9F7;border-radius:6px}
.ol{font-size:12px;color:#5C5650;font-weight:500}
.os{border:1px solid #D8D5CF;border-radius:5px;padding:4px 8px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.nt2{font-size:10.5px;color:#888;font-style:italic}
.lgnote{padding:10px 16px;font-size:10px;color:#888;background:#F9F9F7;border-top:1px solid #F0EDE6}
/* FERMETTE FORM */
.fm-sec{padding:12px 0 6px;border-top:1px solid #F0EDE6;margin-top:10px}
.fm-sec:first-child{border-top:none;margin-top:0;padding-top:0}
.fm-sec-h{font-size:10px;font-weight:700;color:#1B5E8C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.chk-row{display:flex;flex-wrap:wrap;gap:12px}
.chk-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:500;color:#333;user-select:none}
.chk-lbl input[type=checkbox]{width:auto;accent-color:#3A4E1E}
.alert-box{margin-top:8px;padding:7px 10px;background:#FFF3CD;border-radius:6px;font-size:11px;color:#856404;font-weight:500}

.obs-ta{width:100%;min-height:75px;border:none;border-top:1px solid #F0EDE6;resize:vertical;padding:13px 16px;font-size:12px;font-family:inherit;color:#333;background:#FAFAF8;outline:none;line-height:1.6;display:block}
.obs-ta::placeholder{color:#CCC;font-style:italic}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{size:A4 portrait;margin:1cm 1.2cm}
  body{background:#fff!important;font-size:10px!important}
  .hd,.stps,.ab,.fsb,.lgnote,.btn{display:none!important}
  .ct{padding:0!important;max-width:100%!important}
  .fl{display:block!important}
  .fcard{box-shadow:none!important;border:1px solid #CCC!important;border-radius:4px!important}
  .ftb{padding:9px 13px!important}
  .ftb h1{font-size:12.5px!important;letter-spacing:.2px!important}
  .ftb p{font-size:9.5px!important}
  .ftb > div:last-child{font-size:10px!important;padding:5px 9px!important}
  .fsh{padding:5px 13px!important;font-size:8.5px!important;letter-spacing:.4px}
  .idg{grid-template-columns:1fr 1fr!important}
  .il{padding:4px 10px!important;font-size:9.5px!important}
  .iv{padding:4px 10px!important;font-size:10px!important}
  .fnt{font-size:9.5px!important}
  .fnt th{padding:5px 9px!important;font-size:8.5px!important}
  .fnt td{padding:5px 9px!important}
  .og{padding:6px 12px!important;gap:4px!important}
  .or2{padding:4px 8px!important}
  .ol{font-size:9.5px!important}
  .os{font-size:9.5px!important;padding:2px 5px!important;border-radius:3px!important}
  div[style*="min-height:55px"]{padding:8px 13px!important;min-height:35px!important;font-size:9.5px!important}
  .obs-ta{font-size:9.5px!important;min-height:40px!important;padding:8px 13px!important;border:1px solid #DDD!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DONNÉES ──────────────────────────────────────────────────────────────────
const FL={KP1:'KP1',NEO:'NEO / FABRE',FABEMI:'FABEMI',SEAC:'SEAC',RECTOR:'RECTOR',ISOLTOP:'ISOLTOP',FERMETTE:'Fermette'};
const NL=['Vide sanitaire (VS)','HT Sous-sol','HT RDC','HT Étage','Toit Terrasse'];
const TO=['Aucun (niveau non concerné)','Polystyrène isolant','Polystyrène sans rupteur','Entrevous béton','Coffrant bas niveaux (VS/SS)','Coffrant niveaux supérieurs','Coffrant sous-sol spécial'];
const UO=['','11','13','14','15','16','18','19','23','27','30','36','39'];
const RO=['','Sans rupteur','T','T+L','T+R','T+L+R'];
const MAP={
  'Polystyrène isolant':         {KP1:'Isoleader',NEO:'Polystyrène isolant',FABEMI:'Polystyrène isolant',SEAC:'Polystyrène isolant',RECTOR:'Rectosten',ISOLTOP:'Hourdis isolant'},
  'Polystyrène sans rupteur':    {KP1:'Isoleader',NEO:'Polystyrène isolant',FABEMI:'Polystyrène isolant',SEAC:'Polystyrène isolant',RECTOR:'Rectosten',ISOLTOP:'Hourdis isolant'},
  'Entrevous béton':             {KP1:'Béton',NEO:'Hourdis béton',FABEMI:'Béton',SEAC:'Béton',RECTOR:'Hourdis béton',ISOLTOP:'—'},
  'Coffrant bas niveaux (VS/SS)':{KP1:'EMS/EMX',NEO:'Plastivoute',FABEMI:'Optiraid',SEAC:'EBS',RECTOR:'Rectolight',ISOLTOP:'Hourdinov Décaissé'},
  'Coffrant niveaux supérieurs': {KP1:'EMS/EMX',NEO:'Fabribois étage',FABEMI:'Optiraid',SEAC:'EBS',RECTOR:'Rectolight',ISOLTOP:'Hourdinov Décaissé'},
  'Coffrant sous-sol spécial':   {KP1:'Isorupteur/SPX',NEO:'Neostrène coffrant',FABEMI:'—',SEAC:'EBS',RECTOR:'—',ISOLTOP:'Hourdinov Plein M1'},
  'Aucun (niveau non concerné)': {KP1:null,NEO:null,FABEMI:null,SEAC:null,RECTOR:null,ISOLTOP:null}
};
const MW={'UP39|T':31,'UP39|T+L':29,'UP39|T+R':29,'UP39|T+L+R':26,'UP27|T':22,'UP27|T+L':19,'UP27|T+R':19,'UP27|T+L+R':16,'UP23|T':18,'UP23|T+L':14,'UP23|T+R':14,'UP23|T+L+R':11,'UP18|T':14,'UP18|T+L':11,'UP18|T+R':11,'UP18|T+L+R':8,'UP14|T':11,'UP14|T+L':7,'UP14|T+R':7,'UP14|T+L+R':4};
const ZS={'04':'4 - Moyenne','06':'3 - Modérée','07':'3 - Modérée','09':'2 - Faible','11':'2 - Faible','13':'4 - Moyenne','26':'3 - Modérée','30':'2 - Faible','31':'1 - Très faible','34':'2 - Faible','48':'2 - Faible','66':'2 - Faible','81':'2 - Faible','83':'3 - Modérée','84':'3 - Modérée'};
const ZV={'04':'1','06':'2','07':'2','09':'2','11':'3','13':'3','26':'2','30':'2','31':'1','34':'3','48':'2','66':'3','81':'2','83':'2','84':'2'};
const ZN={'04':'C1','06':'A2','07':'C2','09':'A2','11':'D','13':'A2','26':'C2','30':'B2','31':'A2','34':'B2','48':'A2','66':'D','81':'A2','83':'A2','84':'B2'};
const ZC={'04':'H2','06':'H3','07':'H2','09':'H2','11':'H3','13':'H3','26':'H2','30':'H3','31':'H2','34':'H3','48':'H2','66':'H3','81':'H2','83':'H3','84':'H2'};

// ─── STATE ────────────────────────────────────────────────────────────────────
let S={
  view:'form', activeF:'KP1',
  dossier:{ref:'',nom:'',agence:'',atc:'',metreur:'',adresse:'',ville:'',cp:'',entreprise:'',reponse:''},
  four:{KP1:false,NEO:false,FABEMI:false,SEAC:false,RECTOR:false,ISOLTOP:false,FERMETTE:false},
  niveaux:NL.map(n=>({nom:n,type:'Aucun (niveau non concerné)',up:'',rupteur:''})),
  opts:{KP1:{kitFer:'Oui',tremie:'Oui'},NEO:{kitFer:'Oui',tremie:'Oui'},FABEMI:{poutrelles:'Non',planelles:'Non',hoBeton:'Non',hoPolystyrene:'Non'},SEAC:{},RECTOR:{kitFer:'Oui',tremie:'Oui'},ISOLTOP:{kitAcier:'Oui',tremie:'Oui'}},
  obs:{KP1:'',NEO:'',FABEMI:'',SEAC:'',RECTOR:'',ISOLTOP:'',FERMETTE:''},
  infos:{pose:'',etaiement:'Sans étai',garage:false,terrasse:false,exploitation:'Habitation 150 daN/m²',revetement:'Carrelage collé',cloisons:'Plaque de plâtre (légère)',charges:''},
  fermette:{pente:'',tuile:'Mécanique',sandwich:false,murs:20,plafond:'BA13',laine:'',miMur:false,genoise:'',debord:false,typeDebord:'Plat',cote:'',cheminee:false,tradi:false,zBrute:'',zRabote:'',metal:true,contrev:true,liteau:true,demiLiteaux:false,film:false,osb:false}
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function gz(){const d=S.dossier.cp.slice(0,2);return{s:ZS[d]||'',v:ZV[d]?`Zone ${ZV[d]}`:'',n:ZN[d]||'',c:ZC[d]||''};}
function gsel(){return Object.keys(S.four).filter(k=>S.four[k]);}
function gmap(f,niv){
  const{type,up,rupteur}=niv;const m=MAP[type];
  if(!m)return{p:null,u:'',r:'',mw:''};
  const prod=m[f];if(!prod)return{p:null,u:'',r:'',mw:''};
  const isP=type.startsWith('Polystyrène');
  const u=isP?up:'';
  let r='';
  if(f==='KP1'){
    // KP1 : type exact pour polystyrène (T/T+L…), Oui/Non sinon
    r=rupteur||'';
  } else if(isP){
    // Autres fournisseurs polystyrène : Oui/Non depuis type T/T+L ou depuis Oui/Non direct
    if(!rupteur)r='';
    else if(rupteur==='Non'||rupteur==='Sans rupteur')r='Non';
    else r='Oui'; // T / T+L / T+R / T+L+R / Oui → Oui
  } else {
    // Type non-polystyrène : Oui/Non direct
    r=rupteur||'';
  }
  let mw='';
  // Milliwatt KP1 : uniquement si Isoleader + type rupteur précis (T/T+L/…)
  const isRuptType=['T','T+L','T+R','T+L+R'].includes(rupteur);
  if(f==='KP1'&&prod==='Isoleader'&&u&&isRuptType)mw=MW[`UP${u}|${rupteur}`]||'?';
  return{p:prod,u,r,mw};
}
function h(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sopt(arr,cur){return arr.map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('');}

// ─── RENDER NIVEAUX TABLE (ciblé, sans perte de focus) ───────────────────────
function renderNivTable(){
  return`<table>
    <thead><tr><th style="width:22%">Niveau</th><th style="width:34%">Type d'entrevous</th><th style="width:14%">UP</th><th style="width:30%">Type rupteur</th></tr></thead>
    <tbody>${S.niveaux.map((niv,i)=>{
      const isP=niv.type.startsWith('Polystyrène');
      const isPI=niv.type==='Polystyrène isolant';
      // UP : seulement pour polystyrène | Rupteur : toujours, options selon type
      const ruptOpts=isPI?RO:['','Oui','Non'];
      return`<tr>
        <td><span class="nl">${niv.nom}</span></td>
        <td><select class="ns" data-niv="${i}" data-nk="type">${sopt(TO,niv.type)}</select></td>
        <td>${isP?`<select class="ns" data-niv="${i}" data-nk="up">${sopt(UO,niv.up)}</select>`:`<div class="niv-na">—</div>`}</td>
        <td><select class="ns" data-niv="${i}" data-nk="rupteur">${sopt(ruptOpts,niv.rupteur)}</select></td>
      </tr>`;}).join('')}
    </tbody>
  </table>`;
}

// ─── RENDER FOURNISSEUR CARDS ─────────────────────────────────────────────────
function renderFourCards(){
  return Object.keys(FL).map(k=>{
    const isFer=k==='FERMETTE';
    return`<div class="fc ${isFer?'fm':''} ${S.four[k]?'on':''}" data-four="${k}">
      <div class="fck">${S.four[k]?'✓':''}</div>
      <span class="fcl">${FL[k]}</span>
    </div>`;}).join('');
}

// ─── RENDER FORM ──────────────────────────────────────────────────────────────
function renderForm(){
  const zv=gz();const sv=gsel();
  const f=S.fermette;
  return`
<div class="hd">

function renderFiches(){
  const sv=gsel();
  if(!sv.includes(S.activeF)&&sv.length)S.activeF=sv[0];
  const af=S.activeF;
  const zv=gz();const d=S.dossier;const today=new Date().toLocaleDateString('fr-FR');
  const isFer=af==='FERMETTE';
  const f=S.fermette;

  // ── Plancher fiche ──
  let ficheBody='';
  if(!isFer){
    const nivRows=S.niveaux.map((niv,i)=>{
      const{p,u,r,mw}=gmap(af,niv);
      const isO=!p;
      const isoW=af==='ISOLTOP'&&p==='Hourdis isolant'&&i>=2;
      const upW=af==='ISOLTOP'&&u&&!['13','16','19','23'].includes(u);
      return`<tr>
        <td><span class="pn">${niv.nom}</span></td>
        <td>${isO?`<span class="pauc">—</span>`:`<span class="pm">${p}</span>${isoW?` <span class="pwn">⚠ VS/SS seulement</span>`:''}`}</td>
        <td>${u?`<span class="pu">UP ${u}</span>${upW?` <span class="pwn">⚠</span>`:''}`:''}</td>
        <td>${r&&r!=='—'?`<span class="pr">${r}</span>`:''}</td>
        ${af==='KP1'?`<td>${mw?`<span class="pmw">${mw} mW</span>`:''}</td>`:''}
      </tr>`;}).join('');

    const o=S.opts[af]||{};
    let optH='';
    if(af==='KP1'||af==='NEO'||af==='RECTOR'){
      optH=`<div class="fsh or">Options dossier — saisie manuelle</div>
      <div class="og">
        <div class="or2"><span class="ol">Kit fer à chiffrer</span><select class="os" data-opt="${af}" data-ok="kitFer"><option ${o.kitFer!=='Oui'?'selected':''}>Non</option><option ${o.kitFer==='Oui'?'selected':''}>Oui</option></select></div>

      </div>`;
    }else if(af==='ISOLTOP'){
      optH=`<div class="fsh or">Options dossier — saisie manuelle</div>
      <div class="og">
        <div class="or2"><span class="ol">Kit acier complet</span><select class="os" data-opt="ISOLTOP" data-ok="kitAcier"><option ${o.kitAcier!=='Oui'?'selected':''}>Non</option><option ${o.kitAcier==='Oui'?'selected':''}>Oui</option></select></div>

    ficheBody=`

// ─── RENDER & EVENTS ──────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML=S.view==='form'?renderForm():renderFiches();
  attachEvents();
}

function attachEvents(){
  // Champs dossier — PAS de re-render pour éviter perte de focus
  document.querySelectorAll('[df]').forEach(el=>{
    el.addEventListener('input',e=>{
      const k=e.target.getAttribute('df');
      S.dossier[k]=e.target.value;
      // CP: mise à jour ciblée des zones SANS re-render
      if(k==='cp'){
        const dept=e.target.value.slice(0,2);
        const vs=ZS[dept]||'';
        const vv=ZV[dept]?`Zone ${ZV[dept]}`:'';
        const vn=ZN[dept]||'';
        const vc=ZC[dept]||'';
        const zs=document.getElementById('z-s');
        const zv=document.getElementById('z-v');
        const zn=document.getElementById('z-n');
        const zc=document.getElementById('z-c');
        if(zs)zs.value=vs||(e.target.value.length>=2?'⚠ Hors périmètre':'Saisir le CP →');
        if(zv)zv.value=vv||'—';
        if(zn)zn.value=vn||'—';
        if(zc)zc.value=vc||'—';
      }
    });
  });

  // Infos communes
  document.querySelectorAll('[di]').forEach(el=>el.addEventListener('change',e=>S.infos[e.target.getAttribute('di')]=e.target.value));
  document.querySelectorAll('[dib]').forEach(el=>el.addEventListener('change',e=>S.infos[e.target.getAttribute('dib')]=e.target.checked));

  // Fermette champs
  document.querySelectorAll('[df2]').forEach(el=>el.addEventListener('input',e=>S.fermette[e.target.getAttribute('df2')]=e.target.value));
  document.querySelectorAll('[df2-b]').forEach(el=>el.addEventListener('change',e=>{
    const k=e.target.getAttribute('df2-b');
    S.fermette[k]=(e.target.tagName==='SELECT')?e.target.value==='1':e.target.checked;
    // Recalc alerte demi-liteaux
    const alertEl=document.querySelector('.alert-box');
    if(alertEl){alertEl.style.display=((S.fermette.film||S.fermette.osb)&&!S.fermette.demiLiteaux)?'':'none';}
    if(!alertEl&&(S.fermette.film||S.fermette.osb)&&!S.fermette.demiLiteaux){
      const sec=el.closest('.fm-sec');
      if(sec){const ab=document.createElement('div');ab.className='alert-box';ab.textContent='⚠️ Film et/ou OSB sélectionné — les Demi-liteaux sont obligatoires';sec.appendChild(ab);}
    }
  }));

  // Fournisseur toggles
  document.querySelectorAll('[data-four]').forEach(el=>el.addEventListener('click',e=>{
    const k=e.currentTarget.dataset.four;
    S.four[k]=!S.four[k];
    // Mise à jour ciblée des cards + bouton générer
    document.getElementById('four-cards').innerHTML=renderFourCards();
    document.querySelectorAll('[data-four]').forEach(el2=>el2.addEventListener('click',e2=>{
      const k2=e2.currentTarget.dataset.four;S.four[k2]=!S.four[k2];
      document.getElementById('four-cards').innerHTML=renderFourCards();
      attachFourEvents();
      updateSelBadge();
      toggleFermetteCard();
    }));
    attachFourEvents();
    updateSelBadge();
    toggleFermetteCard();
  }));

  // Niveaux — re-render du tableau seulement si changement de type
  document.querySelectorAll('[data-niv]').forEach(el=>el.addEventListener('change',e=>{
    if(e.target.disabled)return;
    const i=+e.target.dataset.niv,k=e.target.dataset.nk;
    S.niveaux[i][k]=e.target.value;
    if(k==='type'){
      const wrap=document.getElementById('niv-table-wrap');
      if(wrap){wrap.innerHTML=renderNivTable();attachNivEvents();}
    }
  }));

  // Bouton générer
  const bg=document.getElementById('btngen');
  if(bg)bg.addEventListener('click',()=>{const sv=gsel();if(!sv.length)return;S.activeF=sv[0];S.view='fiches';render();window.scrollTo(0,0);});

  // Bouton retour
  const bb=document.getElementById('btnback');
  if(bb)bb.addEventListener('click',()=>{S.view='form';render();window.scrollTo(0,0);});

  // Tabs fiches
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',e=>{S.activeF=e.currentTarget.dataset.tab;render();}));

  // Observations
  document.querySelectorAll('[data-obs]').forEach(el=>el.addEventListener('input',e=>{S.obs[e.target.dataset.obs]=e.target.value;}));
  // Options fiches
  document.querySelectorAll('[data-opt]').forEach(el=>el.addEventListener('change',e=>{const f=e.target.dataset.opt,k=e.target.dataset.ok;if(S.opts[f])S.opts[f][k]=e.target.value;}));
}

function attachFourEvents(){
  document.querySelectorAll('[data-four]').forEach(el=>el.addEventListener('click',e=>{
    const k=e.currentTarget.dataset.four;S.four[k]=!S.four[k];
    document.getElementById('four-cards').innerHTML=renderFourCards();
    attachFourEvents();updateSelBadge();toggleFermetteCard();
  }));
}

function attachNivEvents(){
  document.querySelectorAll('[data-niv]').forEach(el=>el.addEventListener('change',e=>{
    if(e.target.disabled)return;
    const i=+e.target.dataset.niv,k=e.target.dataset.nk;
    S.niveaux[i][k]=e.target.value;
    if(k==='type'){const wrap=document.getElementById('niv-table-wrap');if(wrap){wrap.innerHTML=renderNivTable();attachNivEvents();}}
  }));
}

function updateSelBadge(){
  const sv=gsel();
  const bg=document.getElementById('btngen');
  if(bg){bg.disabled=sv.length===0;bg.style.opacity=sv.length===0?'0.4':'1';bg.style.cursor=sv.length===0?'not-allowed':'pointer';}
}

function toggleFermetteCard(){
  const fc=document.getElementById('card-fermette');
  if(fc)fc.style.display=S.four.FERMETTE?'':'none';
}

document.addEventListener('DOMContentLoaded',render);
</script>
